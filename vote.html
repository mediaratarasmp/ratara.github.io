<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vote Server</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="vote.css">

  <!-- ICON -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- CONTENT -->
<div class="container">

  <h1>Vote for Ratara SMP</h1>
  <p class="desc">
    Bantu kami berkembang dengan memberikan suara pada daftar server Minecraft teratas!
    Dukungan Anda berarti segalanya bagi komunitas kami.
  </p>

  <!-- CARD 1 -->
  <div class="card vote-card">
    
    <div class="vote-left">
      <div class="label">Top</div>
      <h2>MinecraftMP</h2>
      <div class="label">Minecraft server listing site</div>
    </div>

    <div class="vote-right">
      <a href="#" class="btn outline">Vote</a>
      <a href="#" class="corner-btn">
        <i class="fas fa-arrow-up-right-from-square"></i>
      </a>
    </div>

  </div>

  <!-- CARD 2 -->
  <div class="card vote-card">
    
    <div class="vote-left">
      <div class="label">Top</div>
      <h2>Minecraft Pocket</h2>
      <div class="label">MinecraftPE server listing site</div>
    </div>

    <div class="vote-right">
      <a href="#" class="btn outline">Vote</a>
      <a href="#" class="corner-btn">
        <i class="fas fa-arrow-up-right-from-square"></i>
      </a>
    </div>

  </div>

</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
