<!DOCTYPE html>
<html lang="id">
<head>

  <title>Kontak Admin - RATARA SMP</title>

  <!-- CSS GLOBAL -->
  <link rel="stylesheet" href="style.css">

  <!-- CSS KHUSUS -->

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- NAVBAR -->
  <div id="navbar"></div>

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- OVERLAY (WAJIB BIAR SIDEBAR WORK) -->

  <!-- ISI HALAMAN -->
  <div class="contact-page">

    <div class="contact-container">
      <h1>Kontak Admin</h1>
      <p class="contact-desc">
        Jika kamu menemukan bug, error, atau membutuhkan bantuan,
        silakan hubungi admin di bawah ini.
      </p>

      <div class="contact-list">

        <a href="https://wa.me/6281234567890" class="contact-box" target="_blank">
          <i class="fa-solid fa-crown"></i>
          <span class="role">Owner</span>
          <span class="name">Jhon</span>
        </a>

        <a href="https://wa.me/6289876543210" class="contact-box" target="_blank">
          <i class="fa-solid fa-star"></i>
          <span class="role">Co-Owner</span>
          <span class="name">Vanes</span>
        </a>

        <a href="#" class="contact-box">
          <i class="fa-solid fa-user-shield"></i>
          <span class="role">Admin</span>
          <span class="name">Raka</span>
        </a>

        <a href="#" class="contact-box">
          <i class="fa-solid fa-user-gear"></i>
          <span class="role">Moderator</span>
          <span class="name">Dika</span>
        </a>

        <a href="#" class="contact-box">
          <i class="fa-solid fa-hands-helping"></i>
          <span class="role">Helper</span>
          <span class="name">Alya</span>
        </a>

      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
